controller_manager:
  ros__parameters:
    update_rate: 100 # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - ltts_joint1
      - ltts_joint2
      - ltts_joint3
      - ltts_joint4
      - ltts_joint5
      - ltts_joint6
      - ltts_joint7

    command_interfaces:
      - position

    state_interfaces:
      - position

    open_loop_control: true
    allow_integration_in_goal_trajectories: true

gripper_controller:
  ros__parameters:
    joints:
      - ltts_finger_joint1
      - ltts_finger_joint2

    command_interfaces:
      - position

    state_interfaces:
      - position

    open_loop_control: true
    allow_integration_in_goal_trajectories: true

joint_state_broadcaster:
  ros__parameters:
    joints:
      - ltts_joint1
      - ltts_joint2
      - ltts_joint3
      - ltts_joint4
      - ltts_joint5
      - ltts_joint6
      - ltts_joint7
      - ltts_finger_joint1
      - ltts_finger_joint2